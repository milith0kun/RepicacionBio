name: 🐛 Bug Report
description: Report a reproducible bug or unexpected behavior.
labels: [bug]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain exactly how to reproduce the issue.
      placeholder: 1. Run X  2. Use Y  3. See error Z
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste logs or attach screenshots.
      render: shell
